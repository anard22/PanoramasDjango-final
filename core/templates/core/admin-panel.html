{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panel de Administración</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="{% static 'core/css/estilos.css' %}" />
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">
      <img src="{% static 'core/img/logo.png' %}" alt="Logo" />
      PanoramasPA
    </a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'perfil' %}">Mi Perfil</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-danger" href="{% url 'logout' %}">
            Salir
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="text-center">
      <img src="{% static 'core/img/logo.png' %}" width="150" />
    </div>

    <h2 class="mb-3 text-center">Panel de Administración</h2>

    <div class="card p-3">
      <p class="text-center text-muted">

      </p>

      <!-- Maqueta visual -->
      <label>Nombre del evento</label>

      <label>Lugar</label>
      <input class="form-control mb-2" disabled>

      <label>Horario</label>
      <input class="form-control mb-2" disabled>

      <button class="btn btn-secondary mt-2" disabled>
        Agregar (función en desarrollo)

    </div>
  </div>
