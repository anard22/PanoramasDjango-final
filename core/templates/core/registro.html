{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/css/estilos.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">

        <div class="text-center mb-3">
          <img src="{% static 'core/img/logo.png' %}" width="150" alt="Logo">
        </div>

        <div class="card p-4">
          <h3 class="text-center mb-3">Crear cuenta</h3>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-info text-center">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}

          <form method="POST" action="{% url 'registro' %}">
            {% csrf_token %}

            <!-- DATOS DEL USUARIO -->
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control mb-3" required>

            <label class="form-label">Correo electrónico</label>
            <input type="email" name="email" class="form-control mb-3" required>

            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control mb-3" required>

            <!-- DATOS DEL PERFIL -->
            <label class="form-label">RUT</label>
            <input type="text" name="rut" class="form-control mb-3" required>

            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono" class="form-control mb-3">

            <label class="form-label">Dirección</label>
            <input type="text" name="direccion" class="form-control mb-3">

            <button type="submit" class="btn btn-success w-100">
              Registrarse
            </button>
          </form>

          <a href="{% url 'login' %}" class="d-block text-center mt-3">
            ¿Ya tienes cuenta? Inicia sesión
          </a>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
