{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crear Panorama</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="container mt-4">

  <h2 class="mb-3">Crear Panorama</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-success">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <label class="form-label">Título</label>
    <input
      type="text"
      name="titulo"
      class="form-control mb-3"
      required
    >

    <label class="form-label">Descripción</label>
    <textarea
      name="descripcion"
      class="form-control mb-3"
      rows="3"
      required
    ></textarea>

    <label class="form-label">Fecha</label>
    <input
      type="date"
      name="fecha"
      class="form-control mb-3"
      required
    >

    <label class="form-label">Lugar</label>
    <input
      type="text"
      name="lugar"
      class="form-control mb-3"
      required
    >

    <button type="submit" class="btn btn-success">
      Guardar Panorama
    </button>

    <a href="{% url 'listar_panoramas' %}" class="btn btn-secondary">
      Volver
    </a>
  </form>

</body>
</html>
