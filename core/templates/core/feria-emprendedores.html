{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Feria de Emprendedores</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'core/css/estilos.css' %}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-custom px-4">
      <a class="navbar-brand fw-bold" href="{% url 'home' %}">
        <img src="{% static 'core/img/logo.png' %}" alt="Logo" height="40" />
        PanoramasPA
      </a>
    </nav>

    <div class="container mt-4">
      <h2 class="text-center mb-4">Feria de Emprendedores</h2>

      <div class="card mb-4">
        <img
          src="{% static 'core/img/feria emprendedores1.jpg' %}"
          class="card-img-top"
          alt="Feria"
        />

        <div class="card-body">
          <h5 class="card-title">
            Foto subida por: <strong>Usuario registrado</strong>
          </h5>
          <p class="card-text">
            Ropa, artesanía y emprendimientos locales en la feria.
          </p>
        </div>
      </div>

      <div class="card p-3">
        <h5>Comentarios</h5>

        <form>
          <textarea
            class="form-control mb-2"
            placeholder="Escribe un comentario..."
            required
          ></textarea>
          <button class="btn btn-custom w-100">Comentar</button>
        </form>
      </div>
    </div>

    
  </body>
</html>
