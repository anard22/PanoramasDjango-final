{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi Perfil</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="{% static 'core/css/estilos.css' %}">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">
      <img src="{% static 'core/img/logo.png' %}" alt="Logo" height="40">
      PanoramasPA
    </a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="{% url 'perfil' %}">Mi Perfil</a>
        </li>

        {% if user.groups.filter(name='Administrador').exists %}
        <li class="nav-item">
          <a class="nav-link" href="{% url 'admin_panel' %}">Admin</a>
        </li>
        {% endif %}

        <li class="nav-item">
          <a class="nav-link text-danger" href="{% url 'logout' %}">Salir</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="text-center mb-3">
      <img src="{% static 'core/img/logo.png' %}" width="150" alt="Logo">
    </div>

    <h2 class="mb-3 text-center">Mi Perfil</h2>

    <div class="card p-4">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-success text-center">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <label class="form-label">Usuario</label>
        <input type="text" class="form-control mb-3" value="{{ request.user.username }}" disabled>

        <label class="form-label">Correo</label>
        <input type="email" class="form-control mb-3" value="{{ request.user.email }}" disabled>

        <label class="form-label">RUT</label>
        <input type="text" class="form-control mb-3" value="{{ request.user.perfil.rut }}" disabled>

        <label class="form-label">Teléfono</label>
        <input
          type="text"
          name="telefono"
          class="form-control mb-3"
          value="{{ request.user.perfil.telefono }}"
        >

        <label class="form-label">Dirección</label>
        <input
          type="text"
          name="direccion"
          class="form-control mb-3"
          value="{{ request.user.perfil.direccion }}"
        >

        <button type="submit" class="btn btn-primary w-100">
          Guardar cambios
        </button>
      </form>
    </div>
  </div>
</body>
</html>
