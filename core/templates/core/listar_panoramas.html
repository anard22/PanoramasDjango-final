{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panoramas</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="container mt-4">

  <h2 class="mb-3">Gestión de Panoramas</h2>

  <a href="{% url 'crear_panorama' %}" class="btn btn-success mb-3">
    Crear nuevo panorama
  </a>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Título</th>
        <th>Lugar</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      {% for panorama in panoramas %}
        <tr>
          <td>{{ panorama.titulo }}</td>
          <td>{{ panorama.lugar }}</td>
          <td>{{ panorama.fecha }}</td>
          <td>
            <a href="{% url 'editar_panorama' panorama.id %}" class="btn btn-sm btn-warning">
              Editar
            </a>
            <a href="{% url 'eliminar_panorama' panorama.id %}" class="btn btn-sm btn-danger">
              Eliminar
            </a>
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="4">No hay panoramas registrados</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>

  <a href="{% url 'admin_panel' %}" class="btn btn-secondary">
    Volver al panel de administración
  </a>

</body>
</html>
